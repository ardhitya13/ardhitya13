name: Generate pacman animation

on:
  schedule: # execute every 12 hours
    - cron: "* */12 * * *"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Create dist directory
        run: mkdir -p dist

      - name: Install and generate pacman animation
        run: |
          npm install -g pacman-contribution-graph
          pacman-contribution-graph --username ${{ github.repository_owner }} --output dist/pacman-contribution-graph.svg
          pacman-contribution-graph --username ${{ github.repository_owner }} --output dist/pacman-contribution-graph-dark.svg --theme github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}